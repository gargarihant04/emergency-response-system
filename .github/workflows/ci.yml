name: SOS Backend CI Pipeline

# 1. The Trigger: When should this run?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-verify:
    # 2. The Environment: What OS should GitHub use?
    runs-on: ubuntu-latest

    steps:
    # 3. Grab your code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Install Python
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 5. Check for Python Syntax Errors (Linting)
    - name: Check for Python Syntax Errors
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 6. Verify the Docker Build works perfectly
    - name: Build Docker Image (Dry Run)
      working-directory: ./backend
      run: |
        docker build -t sos-backend:test .